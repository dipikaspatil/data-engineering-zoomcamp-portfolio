# Set the root logger level to INFO and the appender to 'console'
log4j.rootLogger=INFO, console

# Console Appender configuration
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

# Specific logging levels for Connectors
log4j.logger.org.apache.kafka=WARN
log4j.logger.com.google.cloud.bigquery=INFO
log4j.logger.org.apache.flink.streaming.connectors.kafka=INFO

# Suppress noisy Flink internal heartbeat logs
log4j.logger.org.apache.flink.runtime.executiongraph.ExecutionGraph=WARN