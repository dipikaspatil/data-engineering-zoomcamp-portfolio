services:

  # -----------------------------
  # Redpanda Kafka Broker
  # -----------------------------
  redpanda:
    image: redpandadata/redpanda:v25.3.9  # Match Zoomcamp workshop version
    container_name: redpanda
    command:
      - redpanda start                   # Start Redpanda
      - --overprovisioned                 # Dev-friendly flag for small machines
      - --smp 1                           # Use 1 CPU core
      - --memory 1G                       # Max memory
      - --reserve-memory 0M               # No reserved memory
      - --node-id 0                       # Node ID
      - --check=false                     # Skip some system checks for dev
      - --kafka-addr PLAINTEXT://0.0.0.0:9092   # Listen on all interfaces
      - --advertise-kafka-addr PLAINTEXT://localhost:9092  # For clients
    ports:
      - "9092:9092"   # Kafka port exposed to host
      - "9644:9644"   # Redpanda admin port (optional)

  # -----------------------------
  # Kafka UI for Monitoring
  # -----------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2  # Stable version for UI
    ports:
      - "8080:8080"                 # Access UI in browser via localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: redpanda
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092